<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博因果殿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a1a;
  font-family: 'Press Start 2P', monospace;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
h1 { font-size: 22px; color: #FFD700; text-shadow: 3px 3px 0 #000; margin-bottom: 10px; }
p { font-size: 9px; color: #888; margin-bottom: 40px; }
.cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.card {
  background: #C6C6C6;
  border: 4px solid #000;
  border-top-color: #fff;
  border-left-color: #fff;
  padding: 25px 20px;
  text-align: center;
  width: 240px;
  cursor: pointer;
  text-decoration: none;
  color: #333;
  transition: transform 0.2s;
}
.card:hover { transform: scale(1.05); }
.card .icon { font-size: 50px; margin-bottom: 15px; }
.card .title { font-size: 12px; margin-bottom: 8px; }
.card .desc { font-size: 7px; color: #666; line-height: 1.8; }
footer { margin-top: 40px; font-size: 7px; color: #444; }
</style>
</head>
<body>
<h1>⚡ 赛博因果殿 ⚡</h1>
<p>职场受难 · 解压赎罪 · 功德对冲</p>
<div class="cards">
  <a class="card" href="./voodoo/">
    <div class="icon">🗡️</div>
    <div class="title">赛博扎小人</div>
    <div class="desc">选一个领导<br>扎就完了<br>扎满即清·敲鱼攒针</div>
  </a>
  <a class="card" href="./changsheng/">
    <div class="icon">🏛️</div>
    <div class="title">赛博长生殿</div>
    <div class="desc">给公益站长立牌<br>上香·敲木鱼·留言<br>功德+1+1+1</div>
  </a>
</div>
<footer>赛博因果殿 v1.0 | Made with 😈+🙏</footer>
</body>
</html>

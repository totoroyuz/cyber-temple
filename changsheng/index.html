* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  background-image:

/* 像素风只用于装饰性英文/数字，中文正文全部走系统黑体 */
.pixel, .header .stars, .stat-item .num, .tablet-stat .val, .merit-float {
  font-family: var(--font-pixel);
}
.header { text-align: center; padding: 30px 15px 10px; }
.header h1 {
  font-family: var(--font-ui);
  font-size: 34px;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 3px 3px 0 #000;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.header .subtitle { font-size: 14px; color: #aaa; letter-spacing: 1px; line-height: 1.7; padding: 0 8px; }
.header .stars { font-size: 18px; margin: 8px 0; animation: twinkle 2s infinite alternate; letter-spacing: 6px; }
@keyframes twinkle { 0% { opacity: 0.6; } 100% { opacity: 1; text-shadow: 0 0 10px var(--gold); } }

.stats-bar { display: flex; justify-content: center; gap: 20px; padding: 12px; margin: 10px auto 15px; max-width: 550px; background: rgba(0,0,0,0.4); border: 3px solid #555; flex-wrap: wrap; }
.stat-item { text-align: center; }

.wooden-fish-area { text-align: center; margin: 15px auto; max-width: 350px; }
.wooden-fish-btn { background: none; border: none; cursor: pointer; font-size: 70px; transition: transform 0.1s; user-select: none; }
.wooden-fish-btn:active { transform: scale(0.85); }
.wooden-fish-btn:hover { filter: drop-shadow(0 0 15px var(--gold)); }
.merit-display { font-size: 17px; color: var(--gold); margin-top: 8px; min-height: 18px; }

.tabs { display: flex; justify-content: center; gap: 4px; margin: 15px auto; max-width: 600px; flex-wrap: wrap; padding: 0 10px; }
.tab-btn { font-family: var(--font-ui); font-size: 15px; font-weight: 600; padding: 10px 14px; background: #444; color: #ccc; border: 3px solid #666; border-bottom: none; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { background: #3a3a5c; color: var(--gold); border-color: var(--gold); }
.tab-btn:hover:not(.active) { background: #555; }
.tab-content { display: none; max-width: 900px; margin: 0 auto; padding: 0 10px; }
.tab-content.active { display: block; }
#tabletSearch {
  width: 100%;
  font-family: var(--font-ui) !important;
  font-size: 16px !important;
  padding: 14px 16px !important;
  background: #222;
  color: #eee;
  border: 3px solid #555;
  outline: none;
  border-radius: 2px;
}
#tabletSearch:focus { border-color: var(--gold); }
#tabletSearch::placeholder { color: #888; font-family: var(--font-ui); }

.tablets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 10px; }
.tablet { background: linear-gradient(180deg, #3a3a5c 0%, #2a2a4a 100%); border: 4px solid #555; padding: 0; position: relative; transition: all 0.3s; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s ease forwards; }
.tablet:nth-child(1) { animation-delay: 0.05s; }
.tablet:nth-child(2) { animation-delay: 0.1s; }
.tablet:nth-child(3) { animation-delay: 0.15s; }
.tablet:nth-child(4) { animation-delay: 0.2s; }
.tablet:nth-child(5) { animation-delay: 0.25s; }
.tablet:nth-child(6) { animation-delay: 0.3s; }
.tablet:nth-child(7) { animation-delay: 0.35s; }
.tablet:nth-child(8) { animation-delay: 0.4s; }
.tablet:nth-child(9) { animation-delay: 0.45s; }
.tablet:nth-child(10) { animation-delay: 0.5s; }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
.tablet:hover { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,215,0,0.3); transform: translateY(-3px); }
.tablet-top { background: linear-gradient(180deg, var(--wood), #4a2a10); padding: 8px; text-align: center; border-bottom: 3px solid #333; position: relative; }
.tablet-top::before, .tablet-top::after { content: ''; position: absolute; top: -8px; width: 18px; height: 8px; background: var(--wood); border: 2px solid #333; border-bottom: none; }
.tablet-top::before { left: 15px; }
.tablet-top::after { right: 15px; }
.tablet-name { font-family: var(--font-ui); font-size: 20px; font-weight: 700; color: var(--gold); text-shadow: 1px 1px 0 #000; letter-spacing: 1px; }
.tablet-title { font-size: 13px; color: #ccc; margin-top: 4px; line-height: 1.5; }
.tablet-body { padding: 12px; text-align: center; }
.tablet-avatar { width: 56px; height: 56px; margin: 0 auto 8px; background: #555; border: 3px solid #777; display: flex; align-items: center; justify-content: center; font-size: 32px; }
.tablet-desc { font-size: 14px; color: #ccc; line-height: 1.75; margin-bottom: 10px; min-height: 35px; text-align: left; }
.tablet-reputation { font-size: 13px; color: #bbb; background: rgba(0,0,0,0.2); padding: 8px 10px; margin-bottom: 10px; border-left: 3px solid var(--gold); text-align: left; line-height: 1.7; }
.tablet-stats { display: flex; justify-content: space-around; padding: 6px 0; border-top: 2px solid #444; margin-bottom: 8px; }
.tablet-stat { text-align: center; }
.tablet-stat .val { font-size: 16px; color: var(--gold); display: block; line-height: 1.2; }
.tablet-stat .lbl { font-size: 12px; color: #999; margin-top: 3px; }
.tablet-actions { display: flex; gap: 4px; }
.tablet-actions button { flex: 1; font-family: var(--font-ui); font-size: 14px; font-weight: 600; padding: 8px 4px; background: #444; color: #eee; border: 2px solid #666; cursor: pointer; transition: all 0.2s; }
.tablet-actions button:hover { background: #555; border-color: var(--gold); color: var(--gold); }
.tablet-actions button:active { transform: scale(0.95); }
.tablet-actions button.incense-btn:hover { border-color: #CC3333; color: #CC3333; }

.messages-area { max-width: 650px; margin: 0 auto; padding: 10px; }
.msg-form { background: rgba(0,0,0,0.3); border: 3px solid #555; padding: 12px; margin-bottom: 15px; }
.msg-form label { font-size: 15px; color: var(--gold); display: block; margin-bottom: 6px; font-weight: 600; }
.msg-form input, .msg-form textarea, .msg-form select { width: 100%; font-family: var(--font-ui); font-size: 15px; padding: 10px; background: #222; color: #eee; border: 2px solid #555; margin-bottom: 8px; outline: none; }
.msg-form input:focus, .msg-form textarea:focus { border-color: var(--gold); }
.msg-form textarea { height: 70px; resize: vertical; line-height: 1.6; }
.msg-submit { font-family: var(--font-ui); font-size: 15px; font-weight: 700; padding: 10px 18px; background: var(--grass); color: #fff; border: 3px solid #3a6b1a; cursor: pointer; }
.msg-submit:hover { background: #6a9c42; }
.msg-list { display: flex; flex-direction: column; gap: 8px; }
.msg-card { background: rgba(0,0,0,0.25); border: 2px solid #444; padding: 10px; }
.msg-card .msg-head { display: flex; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
.msg-card .msg-author { font-size: 14px; color: var(--gold); font-weight: 600; }
.msg-card .msg-time { font-size: 12px; color: #888; }
.msg-card .msg-text { font-size: 14px; color: #ddd; line-height: 1.7; word-break: break-word; }
.msg-card .msg-target { font-size: 12px; color: #999; margin-top: 5px; }

.vote-area { max-width: 650px; margin: 0 auto; padding: 10px; }
.vote-form { background: rgba(0,0,0,0.3); border: 3px solid #555; padding: 12px; margin-bottom: 15px; }
.vote-form label { font-size: 15px; color: var(--gold); display: block; margin-bottom: 6px; font-weight: 600; }
.vote-form input { width: 100%; font-family: var(--font-ui); font-size: 15px; padding: 10px; background: #222; color: #eee; border: 2px solid #555; margin-bottom: 8px; outline: none; }
.vote-form input:focus { border-color: var(--gold); }
.vote-list { display: flex; flex-direction: column; gap: 8px; }
.vote-card { background: rgba(0,0,0,0.25); border: 2px solid #444; padding: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.vote-info .vote-name { font-size: 16px; color: #eee; font-weight: 600; }
.vote-info .vote-reason { font-size: 13px; color: #aaa; margin-top: 4px; line-height: 1.5; }
.vote-info .vote-count { font-size: 14px; color: var(--gold); margin-top: 4px; }
.vote-btn { font-family: var(--font-ui); font-size: 14px; font-weight: 700; padding: 8px 12px; background: #444; color: var(--gold); border: 2px solid var(--gold); cursor: pointer; white-space: nowrap; }
.vote-btn:hover { background: var(--gold); color: #222; }
.vote-btn.voted { background: var(--grass); border-color: var(--grass); color: #fff; }

.incense-container { position: relative; height: 45px; margin: 8px 0 4px; overflow: hidden; }
.incense-stick { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; background: linear-gradient(to top, #8B4513, #D2691E); transition: height 0.5s ease; }
.incense-stick.burning .incense-tip { display: block; }
.incense-tip { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: #FF6600; border-radius: 50%; box-shadow: 0 0 6px #FF6600, 0 0 12px #FF3300; animation: glow 1.5s infinite alternate; display: none; }
@keyframes glow { 0% { box-shadow: 0 0 4px #FF6600, 0 0 8px #FF3300; } 100% { box-shadow: 0 0 10px #FF6600, 0 0 20px #FF3300; } }
.smoke { position: absolute; bottom: 35px; left: 50%; width: 5px; height: 5px; background: rgba(200,200,200,0.4); border-radius: 50%; animation: smokeRise 2.5s ease-out forwards; }
@keyframes smokeRise { 0% { opacity: 0.6; transform: translate(-50%, 0) scale(1); } 50% { opacity: 0.3; transform: translate(calc(-50% + 8px), -25px) scale(2); } 100% { opacity: 0; transform: translate(calc(-50% - 4px), -50px) scale(3); } }

.merit-float { position: fixed; font-size: 16px; color: var(--gold); pointer-events: none; animation: floatUp 1s ease-out forwards; text-shadow: 1px 1px 0 #000; z-index: 9999; }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }
.particle { position: fixed; pointer-events: none; z-index: 9998; font-size: 17px; animation: particleFall 1.5s ease-out forwards; }
@keyframes particleFall { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(100px) scale(0); } }

.footer { text-align: center; padding: 25px; font-size: 13px; color: #777; line-height: 1.9; }
.footer a { color: #999; text-decoration: none; }

@media (max-width: 600px) {
  .header h1 { font-size: 28px; letter-spacing: 1px; }

  .stat-item .num { font-size: 18px; }

  .tablets-grid { grid-template-columns: 1fr; }
  .tabs { gap: 3px; }
  .tab-btn { font-size: 14px; padding: 9px 10px; }
  .tablet-name { font-size: 18px; }
  .tablet-actions button { font-size: 14px; padding: 10px 6px; }
  .vote-card { flex-direction: column; align-items: stretch; }
  .vote-btn { width: 100%; }
}

        /* 留言滚动条 */

          background: rgba(0,0,0,0.3);
          border-top: 2px solid #444;
          padding: 6px 0;

// ========== AUDIO ENGINE ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playIncense() {
  ensureAudio();
  const t = audioCtx.currentTime;
  // 上香：音调上飘，像香烟袅袅上升
  [0, 100, 200, 350].forEach((delay, i) => {
    setTimeout(() => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(400 + i * 150, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(600 + i * 200, audioCtx.currentTime + 0.25);
      g.gain.setValueAtTime(0.15 - i * 0.02, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + 0.35);
    }, delay);
  });
}
function playMuyu() {
  ensureAudio();
  const t = audioCtx.currentTime;
  // 木鱼声：短促噪声敲击 + 高频空腔共振
  const dur = 0.25;
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr * dur, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const x = i / sr;
    // 敲击噪声(极短)
    const noise = (Math.random() * 2 - 1) * Math.exp(-x / 0.005) * 0.4;
    // 木鱼空腔共振 ~1200Hz (木鱼特有的清脆高频)
    const body = Math.sin(2 * Math.PI * 1200 * x) * Math.exp(-x / 0.06) * 0.5;
    // 泛音 ~2400Hz
    const overtone = Math.sin(2 * Math.PI * 2400 * x) * Math.exp(-x / 0.03) * 0.2;
    // 低频木头底色 ~400Hz
    const wood = Math.sin(2 * Math.PI * 400 * x) * Math.exp(-x / 0.04) * 0.15;
    d[i] = noise + body + overtone + wood;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.6, t);
  src.connect(g); g.connect(audioCtx.destination);
  src.start(t);
}
function playPray() {
  ensureAudio();
  [400, 500, 600].forEach((freq, i) => {
    setTimeout(() => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.15, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + 0.2);
    }, i * 150);
  });
}


// ========== 每日限制 ==========
function getTodayKey() {
  return new Date().toISOString().slice(0, 10);
}
function getDailyUsage() {
  try {
    const d = JSON.parse(localStorage.getItem('daily_usage') || '{}');
    if (d.date !== getTodayKey()) {
      return { date: getTodayKey(), incense: 0, pray: 0 };
    }
    return d;
  } catch(e) { return { date: getTodayKey(), incense: 0, pray: 0 }; }
}
function saveDailyUsage(u) {
  u.date = getTodayKey();
  localStorage.setItem('daily_usage', JSON.stringify(u));
}
const DAILY_INCENSE_LIMIT = 30;
const DAILY_PRAY_LIMIT = 20;

let vipMode = false; // 彩蛋VIP模式
let muyuComboTotal = 0; // 总连击计数(跨session)
let state = {
  totalMerit: 0, meritCombo: 0, comboTimer: null, lastFishTime: 0,
  messages: [], votes: [], votedIds: new Set(),
  tabletIncense: {}
};

function renderMarqueeMsgs(tabletId) {
  const msgs = state.messages.filter(m => m.target === tabletId || m.target === 'all');
  if (msgs.length === 0) return '<span class="marquee-msg">暂无留言，快来第一个祈福吧~</span>';
  // Show recent 20 messages, loop twice for seamless scroll
  const recent = msgs.slice(0, 20);
  const doubled = [...recent, ...recent];
  return doubled.map(m =>
    `<span class="marquee-msg"><span class="marquee-author">${esc(m.author)}</span>: ${esc(m.text)}</span>`
  ).join('');
}


function refreshMarquees() {
  TABLETS.forEach(t => {
    const inner = document.getElementById('marquee-inner-' + t.id);
    if (inner) {
      inner.innerHTML = renderMarqueeMsgs(t.id);
      // Reset animation
      inner.style.animation = 'none';
      inner.offsetHeight; // trigger reflow
      inner.style.animation = '';
    }
  });
}
function loadState() {
  try {
    const s = localStorage.getItem('cyber_changsheng_v2');
    if (s) {
      const p = JSON.parse(s);
      state.totalMerit = p.totalMerit || 0;
      state.messages = p.messages || [];
      state.votes = p.votes || [];
      state.votedIds = new Set(p.votedIds || []);
      state.tabletIncense = p.tabletIncense || {};
    }
  } catch(e) {}
}
function saveState() {
  localStorage.setItem('cyber_changsheng_v2', JSON.stringify({
    totalMerit: state.totalMerit, messages: state.messages.slice(-200),
    votes: state.votes, tabletIncense: state.tabletIncense,
    votedIds: [...state.votedIds]
  }));
}

function renderTablets() {
  const grid = document.getElementById('tabletsGrid');
  // Sort by popularity: incense + related messages
  const sorted = [...TABLETS].sort((a, b) => {
    const scoreA = (state.tabletIncense[a.id] || 0) + state.messages.filter(m => m.target === a.id || m.target === 'all').length * 3;
    const scoreB = (state.tabletIncense[b.id] || 0) + state.messages.filter(m => m.target === b.id || m.target === 'all').length * 3;
    return scoreB - scoreA;
  });
  grid.innerHTML = sorted.map(t => {
    const inc = state.tabletIncense[t.id] || 0;
    return `
      <div class="tablet" id="tablet-${t.id}">
        <div class="tablet-top">
          <div style="position:absolute;top:2px;right:8px;font-size:14px;color:rgba(255,215,0,0.6);">#\${sorted.indexOf(t)+1}</div>
          <div class="tablet-name">${t.name}</div>
          <div class="tablet-title">${t.title}</div>
        </div>
        <div class="tablet-body">
          <div class="tablet-avatar">${t.avatar}</div>
          <div class="incense-container" id="incense-area-${t.id}">
            <div class="incense-stick" id="stick-${t.id}" style="height:${Math.min(40, Math.max(5, (state.tabletIncense[t.id]||0) * 40 / 50))}px;${(state.tabletIncense[t.id]||0) > 0 ? '' : 'display:none'}" ${(state.tabletIncense[t.id]||0) > 0 ? 'class="incense-stick burning"' : 'class="incense-stick"'}><div class="incense-tip"></div></div>
          </div>
          <div class="tablet-desc">${t.desc.replace(/
/g, '<br>')}</div>
          <div class="tablet-reputation">${t.reputation.replace(/
/g, '<br>')}</div>
          <div style="font-size:14px;color:#ccc;margin-bottom:8px;line-height:1.7;font-weight:500;">🏷️ ${t.tags}</div>
          <div class="tablet-stats">
            <div class="tablet-stat"><span class="val" id="incense-count-${t.id}">${inc}</span><span class="lbl">炷香</span></div>
            <div class="tablet-stat"><span class="val" id="msg-count-${t.id}">${state.messages.filter(m => m.target === t.id || m.target === 'all').length}</span><span class="lbl">留言</span></div>
          </div>
          <div class="tablet-actions">
            <button class="incense-btn" onclick="burnIncense('${t.id}')">🕯️ 上香</button>
            <button onclick="quickPray('${t.id}')">🙏 祈福</button>
          </div>
          <div class="tablet-marquee" id="marquee-${t.id}">
            <div class="tablet-marquee-inner" id="marquee-inner-${t.id}">
              ${renderMarqueeMsgs('${t.id}')}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
  updateStats();
  updateMsgTargetOptions();
}

function burnIncense(id) {
  const usage = getDailyUsage();
  if (!vipMode && usage.incense >= DAILY_INCENSE_LIMIT) {
    showFloat('今日上香次数已用完(每日30次) | 连点木鱼100下解锁VIP彩蛋！');
    return;
  }
  usage.incense++;
  saveDailyUsage(usage);
  state.tabletIncense[id] = (state.tabletIncense[id] || 0) + 1;
  const area = document.getElementById(`incense-area-${id}`);
  if (area) {
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const s = document.createElement('div'); s.className = 'smoke';
        s.style.left = `calc(50% + ${(Math.random()-0.5)*8}px)`;
        area.appendChild(s); setTimeout(() => s.remove(), 2500);
      }, i * 350);
    }
  }
  playIncense();
  spawnParticles('🕯️', 4);
  document.getElementById(`incense-count-${id}`).textContent = state.tabletIncense[id];
  // 更新香的长度
  const stick = document.getElementById(`stick-${id}`);
  if (stick) {
    const h = Math.min(40, Math.max(5, state.tabletIncense[id] * 40 / 50));
    stick.style.height = h + 'px';
    stick.style.display = 'block';
    stick.className = 'incense-stick burning';
  }
  updateStats(); saveState(); renderTablets(); showFloat('🕯️ 功德+1');
}

function filterTablets() {
  const query = document.getElementById('tabletSearch').value.toLowerCase();
  const tablets = document.querySelectorAll('.tablet');
  tablets.forEach(t => {
    const text = t.textContent.toLowerCase();
    t.style.display = text.includes(query) ? 'block' : 'none';
  });
}

const fishBtn = document.getElementById('woodenFish');
fishBtn.addEventListener('click', function(e) {
  const now = Date.now();
  if (now - state.lastFishTime < 200) return;
  state.lastFishTime = now;
  state.totalMerit++; state.meritCombo++;
  clearTimeout(state.comboTimer);
  state.comboTimer = setTimeout(() => { state.meritCombo = 0; updateMeritDisplay(); }, 2000);
  playMuyu();
  muyuComboTotal++;
  // 100连击彩蛋
  if (muyuComboTotal >= 100 && !vipMode) {
    vipMode = true;
    showFloat('🎉 隐藏彩蛋！VIP已解锁！今日无限上香+祈福！', true);
    for (let i = 0; i < 10; i++) spawnParticles('🎉', 5);
    // Play celebration sound
    ensureAudio();
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.3);
      }, i * 200);
    });
  }
  updateMeritDisplay(); updateStats(); saveState();
  const rect = fishBtn.getBoundingClientRect();
  const f = document.createElement('div'); f.className = 'merit-float';
  f.textContent = `功德+1${state.meritCombo > 2 ? ` x${state.meritCombo}` : ''}`;
  f.style.left = (rect.left + rect.width/2 - 30) + 'px';
  f.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(f); setTimeout(() => f.remove(), 1000);
  spawnParticles('✨', 3);
});

function updateMeritDisplay() {
  document.getElementById('meritDisplay').textContent =
    `功德: ${state.totalMerit} | 连击: ${state.meritCombo}${state.meritCombo >= 10 ? ' 🔥' : state.meritCombo >= 5 ? ' ⚡' : ''}`;
}

function postMessage() {
  const name = document.getElementById('msgName').value.trim() || '匿名善人';
  const target = document.getElementById('msgTarget').value;
  const text = document.getElementById('msgText').value.trim();
  if (!text) { alert('留言不能为空！'); return; }
  state.messages.unshift({ id: Date.now(), author: name, target, text, time: new Date().toLocaleString('zh-CN') });
  document.getElementById('msgText').value = '';
  renderMessages(); refreshMarquees(); updateStats(); saveState(); renderTablets();
  showFloat('💬 留言成功'); state.totalMerit++; saveState(); updateMeritDisplay(); updateStats();
}

function renderMessages() {
  const list = document.getElementById('msgList');
  list.innerHTML = state.messages.map(m => {
    const tn = m.target === 'all' ? '所有站长' : (TABLETS.find(t => t.id === m.target)?.name || m.target);
    return `<div class="msg-card">
      <div class="msg-head"><span class="msg-author">📝 ${esc(m.author)}</span><span class="msg-time">${m.time}</span></div>
      <div class="msg-text">${esc(m.text)}</div>
      <div class="msg-target">🙏 致：${tn}</div>
    </div>`;
  }).join('') || '<div style="text-align:center;color:#555;font-size:13px;padding:15px;">还没有留言，快来第一个祈福吧</div>';
}

function quickPray(id) {
  const usage = getDailyUsage();
  if (!vipMode && usage.pray >= DAILY_PRAY_LIMIT) {
    showFloat('今日祈福次数已用完(每日20次) | 连点木鱼100下解锁VIP彩蛋！');
    return;
  }
  usage.pray++;
  saveDailyUsage(usage);
  const t = TABLETS.find(x => x.id === id);
  const prayers = [
    `${t.name}站长功德无量！`, `保佑API永不429！`,
    `愿站长身体健康，站点永续运营！`, `感谢${t.name}大善人！`,
    `祈求API稳定，延迟低低低！`, `${t.name}赛博成佛！`,
    `愿号池永不枯竭！`, `站长好人一生平安！`
  ];
  state.messages.unshift({ id: Date.now(), author: '赛博祈福人', target: id,
    text: prayers[Math.floor(Math.random() * prayers.length)],
    time: new Date().toLocaleString('zh-CN') });
  renderMessages(); updateStats(); saveState(); playPray();
  showFloat('🙏 祈福成功');
  state.totalMerit += 3; saveState(); updateMeritDisplay(); updateStats();
}

function submitNomination() {
  const name = document.getElementById('voteName').value.trim();
  const reason = document.getElementById('voteReason').value.trim();
  if (!name) { alert('请输入站长ID！'); return; }
  if (state.votes.find(v => v.name === name)) { alert('已被提名过了！'); return; }
  state.votes.push({ id: Date.now(), name, reason: reason || '公益站长', votes: 1 });
  state.votedIds.add(state.votes[state.votes.length - 1].id);
  document.getElementById('voteName').value = '';
  document.getElementById('voteReason').value = '';
  renderVotes(); saveState();
}

function vote(nomId) {
  if (state.votedIds.has(nomId)) { alert('已投过票！'); return; }
  const nom = state.votes.find(v => v.id === nomId);
  if (nom) { nom.votes++; state.votedIds.add(nomId); renderVotes(); saveState(); showFloat('📊 投票成功'); }
}

function renderVotes() {
  const list = document.getElementById('voteList');
  const sorted = [...state.votes].sort((a, b) => b.votes - a.votes);
  list.innerHTML = sorted.map(v => {
    const hv = state.votedIds.has(v.id);
    return `<div class="vote-card">
      <div class="vote-info">
        <div class="vote-name">${esc(v.name)}</div>
        <div class="vote-reason">${esc(v.reason)}</div>
        <div class="vote-count">🗳️ ${v.votes} 票${v.votes >= 10 ? ' 🔥热门' : ''}</div>
      </div>
      <button class="vote-btn ${hv ? 'voted' : ''}" onclick="vote(${v.id})">${hv ? '✅ 已投' : '⬆️ 投票'}</button>
    </div>`;
  }).join('') || '<div style="text-align:center;color:#555;font-size:13px;padding:15px;">还没有提名</div>';
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  event.target.classList.add('active');
}

function updateStats() {
  const u = getDailyUsage();
  const left = (DAILY_INCENSE_LIMIT - u.incense) + (DAILY_PRAY_LIMIT - u.pray);
  if (vipMode) {
    document.getElementById('dailyLeft').textContent = '∞';
    document.getElementById('dailyLeft').style.color = '#FFD700';
  } else {
    document.getElementById('dailyLeft').textContent = left;
    document.getElementById('dailyLeft').style.color = left <= 0 ? '#CC3333' : '#5B8C32';
  }
  const ti = Object.values(state.tabletIncense).reduce((s, v) => s + v, 0);
  document.getElementById('totalIncense').textContent = ti;
  document.getElementById('totalMerit').textContent = state.totalMerit;
  document.getElementById('totalMsgs').textContent = state.messages.length;
}
function updateMsgTargetOptions() {
  const sel = document.getElementById('msgTarget');
  sel.innerHTML = '<option value="all">给所有站长</option>' +
    TABLETS.map(t => `<option value="${t.id}">给 ${t.name}</option>`).join('');
}
function showFloat(text, center) {
  const el = document.createElement('div'); el.className = 'merit-float';
  el.textContent = text;
  if (center) {
    el.style.left = '50%'; el.style.top = '40%';
    el.style.transform = 'translateX(-50%)';
    el.style.fontSize = '14px'; el.style.color = '#FFD700';
    el.style.zIndex = '99999';
  } else {
    el.style.left = (30 + Math.random() * 40) + 'vw';
    el.style.top = (30 + Math.random() * 20) + 'vh';
  }
  document.body.appendChild(el); setTimeout(() => el.remove(), 1000);
}
function spawnParticles(emoji, count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div'); p.className = 'particle';
      p.textContent = emoji; p.style.fontSize = (8 + Math.random() * 10) + 'px';
      p.style.left = (30 + Math.random() * 40) + 'vw';
      p.style.top = (30 + Math.random() * 20) + 'vh';
      document.body.appendChild(p); setTimeout(() => p.remove(), 1500);
    }, i * 80);
  }
}
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

loadState(); renderTablets(); renderMessages(); refreshMarquees();

// 每5分钟自动刷新排序+留言滚动
setInterval(() => {
  loadState();
  renderTablets();
  refreshMarquees();
}, 5 * 60 * 1000); renderVotes(); updateMeritDisplay();

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博长生牌 - LinuxDo 公益站长生殿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --grass: #5B8C32;
  --dirt: #8B6914;
  --stone: #7F7F7F;
  --wood: #6B4226;
  --gold: #FFD700;
  --obsidian: #1a1a2e;
  --text-light: #E8E8E8;
  --text-dark: #2a2a2a;
  --incense-red: #CC3333;
  --glow: #FFD700;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #2C2C54;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(0,0,0,0.03) 31px, rgba(0,0,0,0.03) 32px),
    repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(0,0,0,0.03) 31px, rgba(0,0,0,0.03) 32px);
  font-family: 'Press Start 2P', 'Microsoft YaHei', monospace;
  color: var(--text-light);
  min-height: 100vh;
  image-rendering: pixelated;
}

/* ========== HEADER ========== */
.header {
  text-align: center;
  padding: 40px 20px 20px;
  position: relative;
}
.header h1 {
  font-size: 24px;
  color: var(--gold);
  text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
  letter-spacing: 4px;
  margin-bottom: 10px;
}
.header .subtitle {
  font-size: 10px;
  color: #aaa;
  letter-spacing: 2px;
}
.header .stars {
  font-size: 18px;
  margin: 10px 0;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.6; }
  100% { opacity: 1; text-shadow: 0 0 10px var(--gold); }
}

/* ========== STATS BAR ========== */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  margin: 0 auto 20px;
  max-width: 600px;
  background: rgba(0,0,0,0.4);
  border: 3px solid #555;
  border-radius: 0;
}
.stat-item {
  text-align: center;
}
.stat-item .num {
  font-size: 18px;
  color: var(--gold);
  display: block;
}
.stat-item .label {
  font-size: 8px;
  color: #999;
  margin-top: 5px;
}

/* ========== WOODEN FISH ========== */
.wooden-fish-area {
  text-align: center;
  margin: 20px auto;
  max-width: 400px;
}
.wooden-fish-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 60px;
  transition: transform 0.1s;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.wooden-fish-btn:active {
  transform: scale(0.85);
}
.wooden-fish-btn:hover {
  filter: drop-shadow(0 0 15px var(--gold));
}
.merit-display {
  font-size: 12px;
  color: var(--gold);
  margin-top: 10px;
  min-height: 20px;
}
.merit-float {
  position: absolute;
  font-size: 14px;
  color: var(--gold);
  pointer-events: none;
  animation: floatUp 1s ease-out forwards;
  font-family: 'Press Start 2P', monospace;
  text-shadow: 1px 1px 0 #000;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-60px); }
}

/* ========== TABS ========== */
.tabs {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin: 20px auto;
  max-width: 600px;
  flex-wrap: wrap;
  padding: 0 10px;
}
.tab-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 10px 16px;
  background: #444;
  color: #ccc;
  border: 3px solid #666;
  border-bottom: none;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn.active {
  background: #3a3a5c;
  color: var(--gold);
  border-color: var(--gold);
}
.tab-btn:hover:not(.active) {
  background: #555;
}

/* ========== TAB CONTENT ========== */
.tab-content {
  display: none;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 10px;
}
.tab-content.active {
  display: block;
}

/* ========== MEMORIAL TABLETS ========== */
.tablets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  padding: 10px;
}

.tablet {
  background: linear-gradient(180deg, #3a3a5c 0%, #2a2a4a 100%);
  border: 4px solid #555;
  padding: 0;
  position: relative;
  transition: all 0.3s;
  image-rendering: pixelated;
}
.tablet:hover {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(255,215,0,0.3);
  transform: translateY(-3px);
}

.tablet-top {
  background: linear-gradient(180deg, var(--wood), #4a2a10);
  padding: 8px;
  text-align: center;
  border-bottom: 3px solid #333;
  position: relative;
}
.tablet-top::before,
.tablet-top::after {
  content: '';
  position: absolute;
  top: -8px;
  width: 20px;
  height: 8px;
  background: var(--wood);
  border: 2px solid #333;
  border-bottom: none;
}
.tablet-top::before { left: 20px; }
.tablet-top::after { right: 20px; }

.tablet-name {
  font-size: 14px;
  color: var(--gold);
  text-shadow: 1px 1px 0 #000;
  letter-spacing: 3px;
}
.tablet-title {
  font-size: 7px;
  color: #ccc;
  margin-top: 4px;
}

.tablet-body {
  padding: 15px;
  text-align: center;
}
.tablet-avatar {
  width: 64px;
  height: 64px;
  margin: 0 auto 10px;
  background: #555;
  border: 3px solid #777;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  image-rendering: pixelated;
}
.tablet-desc {
  font-size: 8px;
  color: #bbb;
  line-height: 1.8;
  margin-bottom: 12px;
  min-height: 40px;
}

.tablet-stats {
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  border-top: 2px solid #444;
  margin-bottom: 10px;
}
.tablet-stat {
  text-align: center;
}
.tablet-stat .val {
  font-size: 12px;
  color: var(--gold);
  display: block;
}
.tablet-stat .lbl {
  font-size: 7px;
  color: #888;
  margin-top: 3px;
}

.tablet-actions {
  display: flex;
  gap: 5px;
}
.tablet-actions button {
  flex: 1;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 8px 5px;
  background: #444;
  color: #ddd;
  border: 2px solid #666;
  cursor: pointer;
  transition: all 0.2s;
}
.tablet-actions button:hover {
  background: #555;
  border-color: var(--gold);
  color: var(--gold);
}
.tablet-actions button:active {
  transform: scale(0.95);
}
.tablet-actions button.incense-btn:hover { border-color: #CC3333; color: #CC3333; }

/* ========== INCENSE ANIMATION ========== */
.incense-container {
  position: relative;
  height: 50px;
  margin: 10px 0 5px;
  overflow: hidden;
}
.incense-stick {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 35px;
  background: linear-gradient(to top, #8B4513, #D2691E);
}
.incense-tip {
  position: absolute;
  top: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 6px;
  background: #FF6600;
  border-radius: 50%;
  box-shadow: 0 0 8px #FF6600, 0 0 15px #FF3300;
  animation: glow 1.5s infinite alternate;
}
@keyframes glow {
  0% { box-shadow: 0 0 5px #FF6600, 0 0 10px #FF3300; }
  100% { box-shadow: 0 0 12px #FF6600, 0 0 25px #FF3300; }
}
.smoke {
  position: absolute;
  bottom: 40px;
  left: 50%;
  width: 6px;
  height: 6px;
  background: rgba(200,200,200,0.4);
  border-radius: 50%;
  animation: smokeRise 2.5s ease-out forwards;
}
@keyframes smokeRise {
  0% { opacity: 0.6; transform: translate(-50%, 0) scale(1); }
  50% { opacity: 0.3; transform: translate(calc(-50% + 10px), -30px) scale(2); }
  100% { opacity: 0; transform: translate(calc(-50% - 5px), -60px) scale(3); }
}

/* ========== MESSAGE BOARD ========== */
.messages-area {
  max-width: 700px;
  margin: 0 auto;
  padding: 10px;
}
.msg-form {
  background: rgba(0,0,0,0.3);
  border: 3px solid #555;
  padding: 15px;
  margin-bottom: 20px;
}
.msg-form label {
  font-size: 10px;
  color: var(--gold);
  display: block;
  margin-bottom: 8px;
}
.msg-form input, .msg-form textarea {
  width: 100%;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 10px;
  background: #222;
  color: #ddd;
  border: 2px solid #555;
  margin-bottom: 10px;
  outline: none;
}
.msg-form input:focus, .msg-form textarea:focus {
  border-color: var(--gold);
}
.msg-form textarea {
  height: 60px;
  resize: none;
}
.msg-submit {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 10px 20px;
  background: var(--grass);
  color: #fff;
  border: 3px solid #3a6b1a;
  cursor: pointer;
}
.msg-submit:hover {
  background: #6a9c42;
}

.msg-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.msg-card {
  background: rgba(0,0,0,0.25);
  border: 2px solid #444;
  padding: 12px;
}
.msg-card .msg-head {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}
.msg-card .msg-author {
  font-size: 9px;
  color: var(--gold);
}
.msg-card .msg-time {
  font-size: 7px;
  color: #777;
}
.msg-card .msg-text {
  font-size: 9px;
  color: #ccc;
  line-height: 1.8;
  word-break: break-all;
}
.msg-card .msg-target {
  font-size: 7px;
  color: #888;
  margin-top: 6px;
}

/* ========== VOTE SECTION ========== */
.vote-area {
  max-width: 700px;
  margin: 0 auto;
  padding: 10px;
}
.vote-form {
  background: rgba(0,0,0,0.3);
  border: 3px solid #555;
  padding: 15px;
  margin-bottom: 20px;
}
.vote-form label {
  font-size: 10px;
  color: var(--gold);
  display: block;
  margin-bottom: 8px;
}
.vote-form input {
  width: 100%;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 10px;
  background: #222;
  color: #ddd;
  border: 2px solid #555;
  margin-bottom: 10px;
  outline: none;
}
.vote-form input:focus {
  border-color: var(--gold);
}

.vote-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.vote-card {
  background: rgba(0,0,0,0.25);
  border: 2px solid #444;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s;
}
.vote-card:hover {
  border-color: #666;
}
.vote-info .vote-name {
  font-size: 11px;
  color: #ddd;
}
.vote-info .vote-reason {
  font-size: 8px;
  color: #888;
  margin-top: 4px;
}
.vote-info .vote-count {
  font-size: 9px;
  color: var(--gold);
  margin-top: 4px;
}
.vote-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 8px 14px;
  background: #444;
  color: var(--gold);
  border: 2px solid var(--gold);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.vote-btn:hover {
  background: var(--gold);
  color: #222;
}
.vote-btn.voted {
  background: var(--grass);
  border-color: var(--grass);
  color: #fff;
}

/* ========== FOOTER ========== */
.footer {
  text-align: center;
  padding: 30px;
  font-size: 8px;
  color: #555;
}
.footer a {
  color: #888;
  text-decoration: none;
}

/* ========== PIXEL BORDER DECORATION ========== */
.pixel-border {
  position: relative;
}
.pixel-border::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: repeating-linear-gradient(
    90deg,
    var(--gold) 0px, var(--gold) 4px,
    transparent 4px, transparent 8px
  );
  z-index: -1;
  opacity: 0.3;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 600px) {
  .header h1 { font-size: 16px; }
  .stats-bar { gap: 15px; flex-wrap: wrap; }
  .stat-item .num { font-size: 14px; }
  .tablets-grid { grid-template-columns: 1fr; }
  .tabs { gap: 3px; }
  .tab-btn { font-size: 8px; padding: 8px 10px; }
}

/* ========== SCROLL ANIMATION ========== */
.tablet {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s ease forwards;
}
.tablet:nth-child(1) { animation-delay: 0.1s; }
.tablet:nth-child(2) { animation-delay: 0.2s; }
.tablet:nth-child(3) { animation-delay: 0.3s; }
@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}

/* ========== MINECRAFT PARTICLES ========== */
.particle {
  position: fixed;
  width: 4px;
  height: 4px;
  pointer-events: none;
  z-index: 9999;
  animation: particleFall 1.5s ease-out forwards;
}
@keyframes particleFall {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(100px) scale(0); }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="stars">✦ ✦ ✦</div>
  <h1>赛博长生殿</h1>
  <div class="subtitle">LinuxDo 公益站长功德碑</div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-item">
    <span class="num" id="totalIncense">0</span>
    <span class="label">累计上香</span>
  </div>
  <div class="stat-item">
    <span class="num" id="totalMerit">0</span>
    <span class="label">累计功德</span>
  </div>
  <div class="stat-item">
    <span class="num" id="totalMsgs">0</span>
    <span class="label">祈福留言</span>
  </div>
</div>

<!-- WOODEN FISH -->
<div class="wooden-fish-area">
  <button class="wooden-fish-btn" id="woodenFish" title="敲一下功德+1">🪵</button>
  <div class="merit-display" id="meritDisplay">功德: 0 | 连击: 0</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tablets')">🏛️ 长生牌</button>
  <button class="tab-btn" onclick="switchTab('messages')">💬 留言墙</button>
  <button class="tab-btn" onclick="switchTab('vote')">📊 提名投票</button>
</div>

<!-- TAB 1: TABLETS -->
<div class="tab-content active" id="tab-tablets">
  <div class="tablets-grid" id="tabletsGrid"></div>
</div>

<!-- TAB 2: MESSAGES -->
<div class="tab-content" id="tab-messages">
  <div class="messages-area">
    <div class="msg-form">
      <label>✏️ 写下你的祈福留言</label>
      <input type="text" id="msgName" placeholder="你的名字">
      <select id="msgTarget" style="width:100%;font-family:'Press Start 2P',monospace;font-size:9px;padding:10px;background:#222;color:#ddd;border:2px solid #555;margin-bottom:10px;outline:none;">
        <option value="all">给所有站长</option>
      </select>
      <textarea id="msgText" placeholder="写下你想对站长说的话..."></textarea>
      <button class="msg-submit" onclick="postMessage()">🕯️ 留言祈福</button>
    </div>
    <div class="msg-list" id="msgList"></div>
  </div>
</div>

<!-- TAB 3: VOTE -->
<div class="tab-content" id="tab-vote">
  <div class="vote-area">
    <div class="vote-form">
      <label>📊 提名新的公益站长</label>
      <input type="text" id="voteName" placeholder="站长ID / 站点名称">
      <input type="text" id="voteReason" placeholder="提名理由（比如：提供免费Claude API）">
      <button class="msg-submit" onclick="submitNomination()">⬆️ 提交提名</button>
    </div>
    <div class="vote-list" id="voteList"></div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <p>赛博长生殿 v1.0 | 为 LinuxDo 公益站长祈福</p>
  <p style="margin-top:5px;">敲木鱼积功德 · 上香保佑API永不429</p>
  <p style="margin-top:8px;">Made with ❤️ by 小二毛 & 爹</p>
</div>

<script>
// ========== DATA ==========
const TABLETS = [
  {
    id: 'any',
    name: 'any大善人',
    avatar: '😇',
    title: 'LinuxDo 公益API先驱',
    desc: '大善人无私奉献，\n为广大开发者提供免费API，\n功德无量，万世流芳。',
    incense: 0,
    msgs: []
  },
  {
    id: 'baipei',
    name: '百倍',
    avatar: '💪',
    title: '百倍公益站长',
    desc: '以百倍热情服务社区，\n稳定可靠的公益API，\n让开发者无后顾之忧。',
    incense: 0,
    msgs: []
  },
  {
    id: 'junno',
    name: '君の公益',
    avatar: '🌸',
    title: '跨国公益使者',
    desc: '东渡取经归来的站长，\n优质线路用心维护，\n为华人开发者保驾护航。',
    incense: 0,
    msgs: []
  }
];

let state = {
  totalMerit: 0,
  meritCombo: 0,
  comboTimer: null,
  lastFishTime: 0,
  messages: [],
  votes: [],
  votedIds: new Set()
};

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('cyber_changsheng');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.totalMerit = parsed.totalMerit || 0;
      state.messages = parsed.messages || [];
      state.votes = parsed.votes || [];
      state.votedIds = new Set(parsed.votedIds || []);
      if (parsed.tabletIncense) {
        TABLETS.forEach(t => {
          if (parsed.tabletIncense[t.id] !== undefined) {
            t.incense = parsed.tabletIncense[t.id];
          }
        });
      }
    }
  } catch(e) {}
}
function saveState() {
  const tabletIncense = {};
  TABLETS.forEach(t => tabletIncense[t.id] = t.incense);
  localStorage.setItem('cyber_changsheng', JSON.stringify({
    totalMerit: state.totalMerit,
    messages: state.messages,
    votes: state.votes,
    tabletIncense,
    votedIds: [...state.votedIds]
  }));
}

// ========== RENDER TABLETS ==========
function renderTablets() {
  const grid = document.getElementById('tabletsGrid');
  grid.innerHTML = TABLETS.map(t => `
    <div class="tablet" id="tablet-${t.id}">
      <div class="tablet-top">
        <div class="tablet-name">${t.name}</div>
        <div class="tablet-title">${t.title}</div>
      </div>
      <div class="tablet-body">
        <div class="tablet-avatar">${t.avatar}</div>
        <div class="incense-container" id="incense-area-${t.id}">
          <div class="incense-stick">
            <div class="incense-tip"></div>
          </div>
        </div>
        <div class="tablet-desc">${t.desc.replace(/\n/g, '<br>')}</div>
        <div class="tablet-stats">
          <div class="tablet-stat">
            <span class="val" id="incense-count-${t.id}">${t.incense}</span>
            <span class="lbl">炷香</span>
          </div>
          <div class="tablet-stat">
            <span class="val" id="msg-count-${t.id}">${state.messages.filter(m => m.target === t.id || m.target === 'all').length}</span>
            <span class="lbl">留言</span>
          </div>
        </div>
        <div class="tablet-actions">
          <button class="incense-btn" onclick="burnIncense('${t.id}')">🕯️ 上香</button>
          <button onclick="quickPray('${t.id}')">🙏 祈福</button>
        </div>
      </div>
    </div>
  `).join('');
  updateStats();
  updateMsgTargetOptions();
}

// ========== INCENSE ==========
function burnIncense(tabletId) {
  const tablet = TABLETS.find(t => t.id === tabletId);
  if (!tablet) return;
  tablet.incense++;

  // Smoke animation
  const area = document.getElementById(`incense-area-${tabletId}`);
  if (area) {
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const smoke = document.createElement('div');
        smoke.className = 'smoke';
        smoke.style.left = `calc(50% + ${(Math.random()-0.5)*10}px)`;
        area.appendChild(smoke);
        setTimeout(() => smoke.remove(), 2500);
      }, i * 400);
    }
  }

  // Particle effect
  spawnParticles('🕯️', 5);

  document.getElementById(`incense-count-${tabletId}`).textContent = tablet.incense;
  updateStats();
  saveState();
  showFloat(`🕯️ 功德+1`);
}

// ========== WOODEN FISH ==========
const fishBtn = document.getElementById('woodenFish');
fishBtn.addEventListener('click', function(e) {
  const now = Date.now();
  if (now - state.lastFishTime < 200) return; // debounce
  state.lastFishTime = now;

  state.totalMerit++;
  state.meritCombo++;

  clearTimeout(state.comboTimer);
  state.comboTimer = setTimeout(() => { state.meritCombo = 0; updateMeritDisplay(); }, 2000);

  updateMeritDisplay();
  updateStats();
  saveState();

  // Float text
  const rect = fishBtn.getBoundingClientRect();
  const float = document.createElement('div');
  float.className = 'merit-float';
  float.textContent = `功德+1${state.meritCombo > 2 ? ` x${state.meritCombo}` : ''}`;
  float.style.left = (rect.left + rect.width/2 - 30) + 'px';
  float.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(float);
  setTimeout(() => float.remove(), 1000);

  // Particle
  spawnParticles('✨', 3);
});

function updateMeritDisplay() {
  document.getElementById('meritDisplay').textContent =
    `功德: ${state.totalMerit} | 连击: ${state.meritCombo}${state.meritCombo >= 10 ? ' 🔥' : state.meritCombo >= 5 ? ' ⚡' : ''}`;
}

// ========== MESSAGES ==========
function postMessage() {
  const name = document.getElementById('msgName').value.trim() || '匿名善人';
  const target = document.getElementById('msgTarget').value;
  const text = document.getElementById('msgText').value.trim();
  if (!text) { alert('施主，留言不能为空啊！'); return; }

  state.messages.unshift({
    id: Date.now(),
    author: name,
    target,
    text,
    time: new Date().toLocaleString('zh-CN')
  });

  document.getElementById('msgText').value = '';
  renderMessages();
  updateStats();
  saveState();
  showFloat('💬 留言成功，功德+1');
  state.totalMerit++;
  saveState();
  updateMeritDisplay();
  updateStats();
}

function renderMessages() {
  const list = document.getElementById('msgList');
  list.innerHTML = state.messages.map(m => {
    const targetName = m.target === 'all' ? '所有站长' : (TABLETS.find(t => t.id === m.target)?.name || m.target);
    return `
      <div class="msg-card">
        <div class="msg-head">
          <span class="msg-author">📝 ${escapeHtml(m.author)}</span>
          <span class="msg-time">${m.time}</span>
        </div>
        <div class="msg-text">${escapeHtml(m.text)}</div>
        <div class="msg-target">🙏 致：${targetName}</div>
      </div>
    `;
  }).join('');
}

function quickPray(tabletId) {
  const tablet = TABLETS.find(t => t.id === tabletId);
  if (!tablet) return;
  const prayers = [
    `${tablet.name}站长功德无量！`,
    `保佑API永不429！`,
    `愿站长身体健康，站点永续运营！`,
    `感谢${tablet.name}大善人！`,
    `祈求API稳定，延迟低低低！`,
    `${tablet.name}赛博成佛！`
  ];
  const prayer = prayers[Math.floor(Math.random() * prayers.length)];
  state.messages.unshift({
    id: Date.now(),
    author: '赛博祈福人',
    target: tabletId,
    text: prayer,
    time: new Date().toLocaleString('zh-CN')
  });
  renderMessages();
  updateStats();
  saveState();
  showFloat('🙏 祈福成功');
  state.totalMerit += 3;
  saveState();
  updateMeritDisplay();
  updateStats();
}

// ========== VOTE ==========
function submitNomination() {
  const name = document.getElementById('voteName').value.trim();
  const reason = document.getElementById('voteReason').value.trim();
  if (!name) { alert('请输入站长ID！'); return; }

  // Check duplicate
  if (state.votes.find(v => v.name === name)) {
    alert('这位站长已经被提名过了，去投票吧！');
    return;
  }

  state.votes.push({
    id: Date.now(),
    name,
    reason: reason || '公益站长，值得立牌',
    votes: 1
  });
  state.votedIds.add(state.votes[state.votes.length - 1].id);

  document.getElementById('voteName').value = '';
  document.getElementById('voteReason').value = '';
  renderVotes();
  saveState();
}

function vote(nomId) {
  if (state.votedIds.has(nomId)) {
    alert('你已经投过票了！');
    return;
  }
  const nom = state.votes.find(v => v.id === nomId);
  if (nom) {
    nom.votes++;
    state.votedIds.add(nomId);
    renderVotes();
    saveState();
    showFloat('📊 投票成功');
  }
}

function renderVotes() {
  const list = document.getElementById('voteList');
  const sorted = [...state.votes].sort((a, b) => b.votes - a.votes);
  list.innerHTML = sorted.map(v => {
    const hasVoted = state.votedIds.has(v.id);
    return `
      <div class="vote-card">
        <div class="vote-info">
          <div class="vote-name">${escapeHtml(v.name)}</div>
          <div class="vote-reason">${escapeHtml(v.reason)}</div>
          <div class="vote-count">🗳️ ${v.votes} 票${v.votes >= 10 ? ' 🔥热门' : ''}</div>
        </div>
        <button class="vote-btn ${hasVoted ? 'voted' : ''}" onclick="vote(${v.id})">${hasVoted ? '✅ 已投' : '⬆️ 投票'}</button>
      </div>
    `;
  }).join('') || '<div style="text-align:center;color:#777;font-size:9px;padding:20px;">还没有提名，快来第一个提名吧！</div>';
}

// ========== TABS ==========
function switchTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tabName}`).classList.add('active');
  event.target.classList.add('active');
}

// ========== HELPERS ==========
function updateStats() {
  const totalIncense = TABLETS.reduce((sum, t) => sum + t.incense, 0);
  document.getElementById('totalIncense').textContent = totalIncense;
  document.getElementById('totalMerit').textContent = state.totalMerit;
  document.getElementById('totalMsgs').textContent = state.messages.length;
}

function updateMsgTargetOptions() {
  const sel = document.getElementById('msgTarget');
  sel.innerHTML = '<option value="all">给所有站长</option>' +
    TABLETS.map(t => `<option value="${t.id}">给 ${t.name}</option>`).join('');
}

function showFloat(text) {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Press Start 2P',monospace;font-size:14px;color:#FFD700;
    text-shadow:2px 2px 0 #000;pointer-events:none;z-index:9999;
    animation:floatUp 1.5s ease-out forwards;
  `;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function spawnParticles(emoji, count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emoji;
      p.style.fontSize = (8 + Math.random() * 12) + 'px';
      p.style.left = (30 + Math.random() * 40) + 'vw';
      p.style.top = (30 + Math.random() * 20) + 'vh';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }, i * 100);
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== INIT ==========
loadState();
renderTablets();
renderMessages();
renderVotes();
updateMeritDisplay();
</script>

</body>
</html>

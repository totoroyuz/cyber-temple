// ========== AUDIO ENGINE ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playIncense() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(800, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);
  g.gain.setValueAtTime(0.25, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.4);
}
function playMuyu() {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(600, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(250, audioCtx.currentTime + 0.35);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.45);
}
function playPray() {
  ensureAudio();
  [400, 500, 600].forEach((freq, i) => {
    setTimeout(() => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.15, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + 0.2);
    }, i * 150);
  });
}

let state = {
  totalMerit: 0, meritCombo: 0, comboTimer: null, lastFishTime: 0,
  messages: [], votes: [], votedIds: new Set(),
  tabletIncense: {}
};

function loadState() {
  try {
    const s = localStorage.getItem('cyber_changsheng_v2');
    if (s) {
      const p = JSON.parse(s);
      state.totalMerit = p.totalMerit || 0;
      state.messages = p.messages || [];
      state.votes = p.votes || [];
      state.votedIds = new Set(p.votedIds || []);
      state.tabletIncense = p.tabletIncense || {};
    }
  } catch(e) {}
}
function saveState() {
  localStorage.setItem('cyber_changsheng_v2', JSON.stringify({
    totalMerit: state.totalMerit, messages: state.messages.slice(-200),
    votes: state.votes, tabletIncense: state.tabletIncense,
    votedIds: [...state.votedIds]
  }));
}

function renderTablets() {
  const grid = document.getElementById('tabletsGrid');
  grid.innerHTML = TABLETS.map(t => {
    const inc = state.tabletIncense[t.id] || 0;
    return `
      <div class="tablet" id="tablet-${t.id}">
        <div class="tablet-top">
          <div class="tablet-name">${t.name}</div>
          <div class="tablet-title">${t.title}</div>
        </div>
        <div class="tablet-body">
          <div class="tablet-avatar">${t.avatar}</div>
          <div class="incense-container" id="incense-area-${t.id}">
            <div class="incense-stick"><div class="incense-tip"></div></div>
          </div>
          <div class="tablet-desc">${t.desc.replace(/\n/g, '<br>')}</div>
          <div class="tablet-reputation">${t.reputation.replace(/\n/g, '<br>')}</div>
          <div style="font-size:6px;color:#666;margin-bottom:8px;">🏷️ ${t.tags}</div>
          <div class="tablet-stats">
            <div class="tablet-stat"><span class="val" id="incense-count-${t.id}">${inc}</span><span class="lbl">炷香</span></div>
            <div class="tablet-stat"><span class="val" id="msg-count-${t.id}">${state.messages.filter(m => m.target === t.id || m.target === 'all').length}</span><span class="lbl">留言</span></div>
          </div>
          <div class="tablet-actions">
            <button class="incense-btn" onclick="burnIncense('${t.id}')">🕯️ 上香</button>
            <button onclick="quickPray('${t.id}')">🙏 祈福</button>
          </div>
        </div>
      </div>`;
  }).join('');
  updateStats();
  updateMsgTargetOptions();
}

function burnIncense(id) {
  state.tabletIncense[id] = (state.tabletIncense[id] || 0) + 1;
  const area = document.getElementById(`incense-area-${id}`);
  if (area) {
    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const s = document.createElement('div'); s.className = 'smoke';
        s.style.left = `calc(50% + ${(Math.random()-0.5)*8}px)`;
        area.appendChild(s); setTimeout(() => s.remove(), 2500);
      }, i * 350);
    }
  }
  playIncense();
  spawnParticles('🕯️', 4);
  document.getElementById(`incense-count-${id}`).textContent = state.tabletIncense[id];
  updateStats(); saveState(); showFloat('🕯️ 功德+1');
}

const fishBtn = document.getElementById('woodenFish');
fishBtn.addEventListener('click', function(e) {
  const now = Date.now();
  if (now - state.lastFishTime < 200) return;
  state.lastFishTime = now;
  state.totalMerit++; state.meritCombo++;
  clearTimeout(state.comboTimer);
  state.comboTimer = setTimeout(() => { state.meritCombo = 0; updateMeritDisplay(); }, 2000);
  playMuyu();
  updateMeritDisplay(); updateStats(); saveState();
  const rect = fishBtn.getBoundingClientRect();
  const f = document.createElement('div'); f.className = 'merit-float';
  f.textContent = `功德+1${state.meritCombo > 2 ? ` x${state.meritCombo}` : ''}`;
  f.style.left = (rect.left + rect.width/2 - 30) + 'px';
  f.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(f); setTimeout(() => f.remove(), 1000);
  spawnParticles('✨', 3);
});

function updateMeritDisplay() {
  document.getElementById('meritDisplay').textContent =
    `功德: ${state.totalMerit} | 连击: ${state.meritCombo}${state.meritCombo >= 10 ? ' 🔥' : state.meritCombo >= 5 ? ' ⚡' : ''}`;
}

function postMessage() {
  const name = document.getElementById('msgName').value.trim() || '匿名善人';
  const target = document.getElementById('msgTarget').value;
  const text = document.getElementById('msgText').value.trim();
  if (!text) { alert('留言不能为空！'); return; }
  state.messages.unshift({ id: Date.now(), author: name, target, text, time: new Date().toLocaleString('zh-CN') });
  document.getElementById('msgText').value = '';
  renderMessages(); updateStats(); saveState();
  showFloat('💬 留言成功'); state.totalMerit++; saveState(); updateMeritDisplay(); updateStats();
}

function renderMessages() {
  const list = document.getElementById('msgList');
  list.innerHTML = state.messages.map(m => {
    const tn = m.target === 'all' ? '所有站长' : (TABLETS.find(t => t.id === m.target)?.name || m.target);
    return `<div class="msg-card">
      <div class="msg-head"><span class="msg-author">📝 ${esc(m.author)}</span><span class="msg-time">${m.time}</span></div>
      <div class="msg-text">${esc(m.text)}</div>
      <div class="msg-target">🙏 致：${tn}</div>
    </div>`;
  }).join('') || '<div style="text-align:center;color:#555;font-size:8px;padding:15px;">还没有留言，快来第一个祈福吧</div>';
}

function quickPray(id) {
  const t = TABLETS.find(x => x.id === id);
  const prayers = [
    `${t.name}站长功德无量！`, `保佑API永不429！`,
    `愿站长身体健康，站点永续运营！`, `感谢${t.name}大善人！`,
    `祈求API稳定，延迟低低低！`, `${t.name}赛博成佛！`,
    `愿号池永不枯竭！`, `站长好人一生平安！`
  ];
  state.messages.unshift({ id: Date.now(), author: '赛博祈福人', target: id,
    text: prayers[Math.floor(Math.random() * prayers.length)],
    time: new Date().toLocaleString('zh-CN') });
  renderMessages(); updateStats(); saveState(); playPray();
  showFloat('🙏 祈福成功');
  state.totalMerit += 3; saveState(); updateMeritDisplay(); updateStats();
}

function submitNomination() {
  const name = document.getElementById('voteName').value.trim();
  const reason = document.getElementById('voteReason').value.trim();
  if (!name) { alert('请输入站长ID！'); return; }
  if (state.votes.find(v => v.name === name)) { alert('已被提名过了！'); return; }
  state.votes.push({ id: Date.now(), name, reason: reason || '公益站长', votes: 1 });
  state.votedIds.add(state.votes[state.votes.length - 1].id);
  document.getElementById('voteName').value = '';
  document.getElementById('voteReason').value = '';
  renderVotes(); saveState();
}

function vote(nomId) {
  if (state.votedIds.has(nomId)) { alert('已投过票！'); return; }
  const nom = state.votes.find(v => v.id === nomId);
  if (nom) { nom.votes++; state.votedIds.add(nomId); renderVotes(); saveState(); showFloat('📊 投票成功'); }
}

function renderVotes() {
  const list = document.getElementById('voteList');
  const sorted = [...state.votes].sort((a, b) => b.votes - a.votes);
  list.innerHTML = sorted.map(v => {
    const hv = state.votedIds.has(v.id);
    return `<div class="vote-card">
      <div class="vote-info">
        <div class="vote-name">${esc(v.name)}</div>
        <div class="vote-reason">${esc(v.reason)}</div>
        <div class="vote-count">🗳️ ${v.votes} 票${v.votes >= 10 ? ' 🔥热门' : ''}</div>
      </div>
      <button class="vote-btn ${hv ? 'voted' : ''}" onclick="vote(${v.id})">${hv ? '✅ 已投' : '⬆️ 投票'}</button>
    </div>`;
  }).join('') || '<div style="text-align:center;color:#555;font-size:8px;padding:15px;">还没有提名</div>';
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  event.target.classList.add('active');
}

function updateStats() {
  const ti = Object.values(state.tabletIncense).reduce((s, v) => s + v, 0);
  document.getElementById('totalIncense').textContent = ti;
  document.getElementById('totalMerit').textContent = state.totalMerit;
  document.getElementById('totalMsgs').textContent = state.messages.length;
}
function updateMsgTargetOptions() {
  const sel = document.getElementById('msgTarget');
  sel.innerHTML = '<option value="all">给所有站长</option>' +
    TABLETS.map(t => `<option value="${t.id}">给 ${t.name}</option>`).join('');
}
function showFloat(text) {
  const el = document.createElement('div'); el.className = 'merit-float';
  el.textContent = text;
  el.style.left = (30 + Math.random() * 40) + 'vw';
  el.style.top = (30 + Math.random() * 20) + 'vh';
  document.body.appendChild(el); setTimeout(() => el.remove(), 1000);
}
function spawnParticles(emoji, count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div'); p.className = 'particle';
      p.textContent = emoji; p.style.fontSize = (8 + Math.random() * 10) + 'px';
      p.style.left = (30 + Math.random() * 40) + 'vw';
      p.style.top = (30 + Math.random() * 20) + 'vh';
      document.body.appendChild(p); setTimeout(() => p.remove(), 1500);
    }, i * 80);
  }
}
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

loadState(); renderTablets(); renderMessages(); renderVotes(); updateMeritDisplay();
</script>
</body>
</html>

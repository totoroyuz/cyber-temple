<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机电工程系学生会·赛博长生殿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root {
  --grass: #5B8C32; --wood: #6B4226; --gold: #FFD700;
  --text-light: #E8E8E8; --red: #CC3333; --blue: #4466AA;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: #1a2332;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(255,255,255,0.02) 31px, rgba(255,255,255,0.02) 32px),
    repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(255,255,255,0.02) 31px, rgba(255,255,255,0.02) 32px);
  font-family: 'Press Start 2P', 'Microsoft YaHei', monospace;
  color: var(--text-light); min-height: 100vh; image-rendering: pixelated;
}
.header { text-align: center; padding: 30px 15px 10px; }
.header h1 { font-size: 22px; color: var(--gold); text-shadow: 3px 3px 0 #000; letter-spacing: 3px; margin-bottom: 8px; }
.header .subtitle { font-size: 10px; color: #888; letter-spacing: 2px; }
.header .school { font-size: 8px; color: #5566AA; margin-top: 5px; }

.stats-bar { display: flex; justify-content: center; gap: 18px; padding: 12px; margin: 10px auto 15px; max-width: 550px; background: rgba(0,0,0,0.4); border: 3px solid #444; flex-wrap: wrap; }
.stat-item { text-align: center; }
.stat-item .num { font-size: 18px; color: var(--gold); display: block; }
.stat-item .label { font-size: 8px; color: #999; margin-top: 3px; }

.wooden-fish-area { text-align: center; margin: 15px auto; max-width: 350px; }
.wooden-fish-btn { background: none; border: none; cursor: pointer; font-size: 60px; transition: transform 0.1s; user-select: none; }
.wooden-fish-btn:active { transform: scale(0.85); }
.wooden-fish-btn:hover { filter: drop-shadow(0 0 15px var(--gold)); }
.merit-display { font-size: 11px; color: var(--gold); margin-top: 8px; min-height: 18px; }

.tabs { display: flex; justify-content: center; gap: 4px; margin: 15px auto; max-width: 600px; flex-wrap: wrap; padding: 0 10px; }
.tab-btn { font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 10px 14px; background: #333; color: #aaa; border: 3px solid #555; border-bottom: none; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { background: #2a3a4a; color: var(--gold); border-color: var(--gold); }
.tab-btn:hover:not(.active) { background: #444; }
.tab-content { display: none; max-width: 900px; margin: 0 auto; padding: 0 10px; }
.tab-content.active { display: block; }

/* ========== 按部门分组 ========== */
.dept-section { margin-bottom: 25px; }
.dept-title {
  font-size: 12px; color: var(--gold); text-align: center;
  padding: 10px; margin-bottom: 12px;
  background: rgba(255,215,0,0.08); border: 2px solid rgba(255,215,0,0.2);
  letter-spacing: 3px;
}
.dept-title .dept-icon { font-size: 16px; margin-right: 8px; }

.tablets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; padding: 0 5px; }
.tablet { background: linear-gradient(180deg, #2a3a4a 0%, #1a2a3a 100%); border: 3px solid #445; padding: 0; position: relative; transition: all 0.3s; opacity: 0; transform: translateY(15px); animation: fadeInUp 0.4s ease forwards; }
.tablet:hover { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.2); transform: translateY(-2px); }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
.tablet-top { background: linear-gradient(180deg, #3a4a5a, #2a3a4a); padding: 8px; text-align: center; border-bottom: 2px solid #445; }
.tablet-name { font-size: 13px; color: var(--gold); text-shadow: 1px 1px 0 #000; }
.tablet-role { font-size: 8px; color: #aac; margin-top: 3px; }
.tablet-body { padding: 10px; text-align: center; }
.tablet-avatar { width: 50px; height: 50px; margin: 0 auto 6px; background: #3a4a5a; border: 2px solid #556; display: flex; align-items: center; justify-content: center; font-size: 26px; }

.incense-container { position: relative; height: 40px; margin: 6px 0; overflow: hidden; }
.incense-stick { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 3px; background: linear-gradient(to top, #8B4513, #D2691E); transition: height 0.5s ease; }
.incense-tip { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #FF6600; border-radius: 50%; box-shadow: 0 0 5px #FF6600, 0 0 10px #FF3300; animation: glow 1.5s infinite alternate; display: none; }
@keyframes glow { 0% { box-shadow: 0 0 3px #FF6600; } 100% { box-shadow: 0 0 10px #FF6600, 0 0 18px #FF3300; } }
.incense-stick.burning .incense-tip { display: block; }
.smoke { position: absolute; bottom: 30px; left: 50%; width: 4px; height: 4px; background: rgba(200,200,200,0.3); border-radius: 50%; animation: smokeRise 2s ease-out forwards; }
@keyframes smokeRise { 0% { opacity: 0.5; transform: translate(-50%,0) scale(1); } 100% { opacity: 0; transform: translate(calc(-50%+6px),-40px) scale(2.5); } }

.tablet-stats { display: flex; justify-content: space-around; padding: 5px 0; border-top: 2px solid #3a4a5a; margin: 6px 0; }
.tablet-stat .val { font-size: 12px; color: var(--gold); display: block; }
.tablet-stat .lbl { font-size: 7px; color: #777; }
.tablet-actions { display: flex; gap: 4px; }
.tablet-actions button { flex: 1; font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 6px 4px; background: #3a4a5a; color: #bbb; border: 2px solid #556; cursor: pointer; }
.tablet-actions button:hover { background: #4a5a6a; border-color: var(--gold); color: var(--gold); }

.tablet-marquee { overflow: hidden; background: rgba(0,0,0,0.2); border-top: 1px solid #3a4a5a; padding: 4px 0; margin-top: 6px; height: 24px; position: relative; }
.tablet-marquee-inner { display: inline-flex; white-space: nowrap; animation: marqueeScroll 18s linear infinite; position: absolute; top: 50%; transform: translateY(-50%); }
.tablet-marquee:hover .tablet-marquee-inner { animation-play-state: paused; }
@keyframes marqueeScroll { 0% { transform: translateY(-50%) translateX(0); } 100% { transform: translateY(-50%) translateX(-50%); } }
.marquee-msg { font-size: 7px; color: #999; padding: 0 15px; }
.marquee-msg .marquee-author { color: var(--gold); }

.messages-area { max-width: 650px; margin: 0 auto; padding: 10px; }
.msg-form { background: rgba(0,0,0,0.3); border: 3px solid #445; padding: 12px; margin-bottom: 15px; }
.msg-form label { font-size: 10px; color: var(--gold); display: block; margin-bottom: 6px; }
.msg-form input, .msg-form textarea, .msg-form select { width: 100%; font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 8px; background: #1a2a3a; color: #ddd; border: 2px solid #445; margin-bottom: 8px; outline: none; }
.msg-form input:focus, .msg-form textarea:focus { border-color: var(--gold); }
.msg-form textarea { height: 50px; resize: none; }
.msg-submit { font-family: 'Press Start 2P', monospace; font-size: 10px; padding: 8px 18px; background: var(--grass); color: #fff; border: 3px solid #3a6b1a; cursor: pointer; }
.msg-submit:hover { background: #6a9c42; }
.msg-list { display: flex; flex-direction: column; gap: 8px; }
.msg-card { background: rgba(0,0,0,0.2); border: 2px solid #3a4a5a; padding: 10px; }
.msg-card .msg-head { display: flex; justify-content: space-between; margin-bottom: 5px; }
.msg-card .msg-author { font-size: 9px; color: var(--gold); }
.msg-card .msg-time { font-size: 7px; color: #666; }
.msg-card .msg-text { font-size: 9px; color: #ccc; line-height: 1.8; }
.msg-card .msg-target { font-size: 7px; color: #777; margin-top: 4px; }

.merit-float { position: fixed; font-size: 12px; color: var(--gold); pointer-events: none; animation: floatUp 1s ease-out forwards; font-family: 'Press Start 2P', monospace; text-shadow: 1px 1px 0 #000; z-index: 9999; }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-60px); } }
.particle { position: fixed; pointer-events: none; z-index: 9998; font-size: 10px; animation: particleFall 1.5s ease-out forwards; }
@keyframes particleFall { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(80px) scale(0); } }

.footer { text-align: center; padding: 25px; font-size: 7px; color: #445; line-height: 2; }
@media (max-width: 600px) { .header h1 { font-size: 15px; } .tablets-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>🏛️ 学生会·赛博长生殿</h1>
  <div class="subtitle">机电工程系2025届团总支学生会干部功德碑</div>
  <div class="school">贵州轻工职业大学 · 机电工程系</div>
</div>

<div class="stats-bar">
  <div class="stat-item"><span class="num" id="totalIncense">0</span><span class="label">累计上香</span></div>
  <div class="stat-item"><span class="num" id="totalMerit">0</span><span class="label">累计功德</span></div>
  <div class="stat-item"><span class="num" id="totalMsgs">0</span><span class="label">祈福留言</span></div>
  <div class="stat-item"><span class="num" id="dailyLeft" style="color:#5B8C32">50</span><span class="label">今日剩余</span></div>
</div>

<div class="wooden-fish-area">
  <button class="wooden-fish-btn" id="woodenFish" title="敲一下功德+1">🐟</button>
  <div class="merit-display" id="meritDisplay">功德: 0 | 连击: 0</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tablets')">🏛️ 长生牌</button>
  <button class="tab-btn" onclick="switchTab('messages')">💬 留言墙</button>
</div>

<div class="tab-content active" id="tab-tablets">
  <div id="deptsContainer"></div>
</div>

<div class="tab-content" id="tab-messages">
  <div class="messages-area">
    <div class="msg-form">
      <label>✏️ 写下你的祝福留言</label>
      <input type="text" id="msgName" placeholder="你的名字">
      <select id="msgTarget"><option value="all">给所有人</option></select>
      <textarea id="msgText" placeholder="写下你想对学生会干部说的话..."></textarea>
      <button class="msg-submit" onclick="postMessage()">🕯️ 留言祈福</button>
    </div>
    <div class="msg-list" id="msgList"></div>
  </div>
</div>

<div class="footer">
  <p>机电工程系学生会·赛博长生殿 v1.0</p>
  <p>为学生会的同学们祈福加油 💪</p>
  <p style="margin-top:5px;">Made with ❤️ by 余老师 & 小二毛</p>
</div>

<script>
// ========== AUDIO ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function playIncense() {
  ensureAudio();
  [400,550,700,900].forEach((f,i) => { setTimeout(() => {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*1.3, audioCtx.currentTime+0.25);
    g.gain.setValueAtTime(0.12,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.3);
  }, i*120); });
}
function playMuyu() {
  ensureAudio();
  const sr=audioCtx.sampleRate, dur=0.25, buf=audioCtx.createBuffer(1,sr*dur,sr), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const x=i/sr;
    d[i]=(Math.random()*2-1)*Math.exp(-x/0.005)*0.4+Math.sin(2*Math.PI*1200*x)*Math.exp(-x/0.06)*0.5+Math.sin(2*Math.PI*2400*x)*Math.exp(-x/0.03)*0.2+Math.sin(2*Math.PI*400*x)*Math.exp(-x/0.04)*0.15;
  }
  const src=audioCtx.createBufferSource(), g=audioCtx.createGain();
  src.buffer=buf; g.gain.setValueAtTime(0.6,audioCtx.currentTime);
  src.connect(g); g.connect(audioCtx.destination); src.start();
}
function playPray() {
  ensureAudio();
  [400,500,600].forEach((f,i)=>{setTimeout(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.2);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2);},i*150);});
}

// ========== DATA ==========
const DEPTS = [
  { name: '主席团', icon: '👑', color: '#FFD700', members: [
    { id: 'zhengjinhua', name: '郑金华', role: '学生会主席', avatar: '👨‍💼' },
    { id: 'denghailang', name: '邓海浪', role: '副主席', avatar: '🧑‍💼' },
    { id: 'jinweiqiang', name: '金炜强', role: '副主席', avatar: '👨‍🎓' },
  ]},
  { name: '办公室', icon: '📋', color: '#4488CC', members: [
    { id: 'liuyue', name: '刘超', role: '办公室主任', avatar: '👩‍💼' },
    { id: 'jiangjiakui', name: '蒋佳拿', role: '副主任', avatar: '🧑‍💻' },
    { id: 'yangxiao', name: '杨骁', role: '副主任', avatar: '👨‍💻' },
  ]},
  { name: '权益部', icon: '⚖️', color: '#CC6644', members: [
    { id: 'yaotao', name: '姚涛', role: '权益部部长', avatar: '🛡️' },
    { id: 'zhangyuanting', name: '张元婷', role: '副部长', avatar: '👩‍⚖️' },
    { id: 'cuijintao', name: '崔锦涛', role: '副部长', avatar: '⚖️' },
  ]},
  { name: '文体部', icon: '🎭', color: '#CC4488', members: [
    { id: 'chenguifei', name: '陈贵飞', role: '文体部部长', avatar: '🎨' },
    { id: 'liuzhihao', name: '刘志豪', role: '副部长', avatar: '⚽' },
    { id: 'zhangguangjun', name: '张广军', role: '副部长', actor: '🎵' },
    { id: 'zhangziyu', name: '张子宇', role: '副部长', avatar: '🏀' },
  ]},
  { name: '组织部', icon: '📝', color: '#44AA44', members: [
    { id: 'xiejun', name: '谢军', role: '组织部部长', avatar: '📊' },
    { id: 'lihonglei', name: '李洪磊', role: '副部长', avatar: '📝' },
    { id: 'yangkaixun', name: '杨开勋', role: '副部长', avatar: '🗂️' },
  ]},
  { name: '社团部', icon: '🎪', color: '#AA8844', members: [
    { id: 'liuzhaohui', name: '刘朝辉', role: '社团部部长', avatar: '🎪' },
    { id: 'yanrenjie', name: '严任杰', role: '副部长', avatar: '🎭' },
  ]},
  { name: '宣传部', icon: '📢', color: '#8844CC', members: [
    { id: 'zenglingxin', name: '曾令鑫', role: '宣传部部长', avatar: '📢' },
    { id: 'lujinyin', name: '陆金银', role: '副部长', avatar: '📰' },
    { id: 'zhangxinyuan', name: '张馨元', role: '副部长', avatar: '✍️' },
  ]},
];

// Flatten all members
const ALL_MEMBERS = DEPTS.flatMap(d => d.members.map(m => ({...m, dept: d.name})));

// ========== STATE ==========
let vipMode = false, muyuComboTotal = 0;
function getTodayKey() { return new Date().toISOString().slice(0,10); }
function getDailyUsage() { try { const d=JSON.parse(localStorage.getItem('stu_daily')||'{}'); if(d.date!==getTodayKey()) return {date:getTodayKey(),incense:0,pray:0}; return d; } catch(e){ return {date:getTodayKey(),incense:0,pray:0}; } }
function saveDailyUsage(u) { u.date=getTodayKey(); localStorage.setItem('stu_daily',JSON.stringify(u)); }
const DAILY_INCENSE_LIMIT=30, DAILY_PRAY_LIMIT=20;

let state = { totalMerit:0, meritCombo:0, comboTimer:null, lastFishTime:0, messages:[], tabletIncense:{} };

function loadState() { try { const s=localStorage.getItem('stu_temple'); if(s){const p=JSON.parse(s); state.totalMerit=p.totalMerit||0; state.messages=p.messages||[]; state.tabletIncense=p.tabletIncense||{};} } catch(e){} }
function saveState() { localStorage.setItem('stu_temple', JSON.stringify({totalMerit:state.totalMerit, messages:state.messages.slice(-200), tabletIncense:state.tabletIncense})); }

// ========== RENDER ==========
function renderDepts() {
  const container = document.getElementById('deptsContainer');
  container.innerHTML = DEPTS.map(dept => `
    <div class="dept-section">
      <div class="dept-title" style="border-color:${dept.color}40;background:${dept.color}10">
        <span class="dept-icon">${dept.icon}</span>${dept.name}
      </div>
      <div class="tablets-grid">
        ${dept.members.map(m => {
          const inc = state.tabletIncense[m.id] || 0;
          const stickH = Math.min(35, Math.max(4, inc * 35 / 30));
          return `
          <div class="tablet" style="animation-delay:${Math.random()*0.3}s">
            <div class="tablet-top" style="background:linear-gradient(180deg,${dept.color}30,${dept.color}10)">
              <div class="tablet-name">${m.name}</div>
              <div class="tablet-role">${m.role}</div>
            </div>
            <div class="tablet-body">
              <div class="tablet-avatar">${m.avatar}</div>
              <div class="incense-container" id="incense-area-${m.id}">
                <div class="incense-stick ${inc>0?'burning':''}" id="stick-${m.id}" style="height:${stickH}px;${inc>0?'':'display:none'}">
                  <div class="incense-tip"></div>
                </div>
              </div>
              <div class="tablet-stats">
                <div class="tablet-stat"><span class="val" id="inc-${m.id}">${inc}</span><span class="lbl">炷香</span></div>
                <div class="tablet-stat"><span class="val">${state.messages.filter(x=>x.target===m.id||x.target==='all').length}</span><span class="lbl">留言</span></div>
              </div>
              <div class="tablet-actions">
                <button onclick="burnIncense('${m.id}')">🕯️ 上香</button>
                <button onclick="quickPray('${m.id}')">🙏 祈福</button>
              </div>
              <div class="tablet-marquee" id="marquee-${m.id}">
                <div class="tablet-marquee-inner" id="marquee-inner-${m.id}">${renderMarqueeMsgs(m.id)}</div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
  updateStats(); updateMsgTargetOptions();
}

function renderMarqueeMsgs(id) {
  const msgs = state.messages.filter(m => m.target === id || m.target === 'all').slice(0,15);
  if (!msgs.length) return '<span class="marquee-msg">快来第一个留言吧~</span>';
  const doubled = [...msgs, ...msgs];
  return doubled.map(m => `<span class="marquee-msg"><span class="marquee-author">${esc(m.author)}</span>: ${esc(m.text)}</span>`).join('');
}

function refreshMarquees() {
  ALL_MEMBERS.forEach(m => {
    const inner = document.getElementById('marquee-inner-'+m.id);
    if (inner) { inner.innerHTML = renderMarqueeMsgs(m.id); inner.style.animation='none'; inner.offsetHeight; inner.style.animation=''; }
  });
}

// ========== ACTIONS ==========
function burnIncense(id) {
  const u = getDailyUsage();
  if (!vipMode && u.incense >= DAILY_INCENSE_LIMIT) { showFloat('今日上香已用完(30次) | 连点木鱼100下解锁VIP！'); return; }
  u.incense++; saveDailyUsage(u);
  state.tabletIncense[id] = (state.tabletIncense[id]||0) + 1;
  playIncense();
  const area = document.getElementById('incense-area-'+id);
  if (area) { for(let i=0;i<3;i++) setTimeout(()=>{const s=document.createElement('div');s.className='smoke';s.style.left=`calc(50%+${(Math.random()-0.5)*6}px)`;area.appendChild(s);setTimeout(()=>s.remove(),2000);},i*300); }
  const stick = document.getElementById('stick-'+id);
  if (stick) { stick.style.height = Math.min(35,Math.max(4,state.tabletIncense[id]*35/30))+'px'; stick.style.display='block'; stick.className='incense-stick burning'; }
  const cnt = document.getElementById('inc-'+id); if(cnt) cnt.textContent = state.tabletIncense[id];
  spawnParticles('🕯️',3); updateStats(); saveState(); showFloat('🕯️ 上香+1');
}

function quickPray(id) {
  const u = getDailyUsage();
  if (!vipMode && u.pray >= DAILY_PRAY_LIMIT) { showFloat('今日祈福已用完(20次) | 连点木鱼100下解锁VIP！'); return; }
  u.pray++; saveDailyUsage(u);
  state.tabletIncense[id] = (state.tabletIncense[id]||0) + 2;
  const m = ALL_MEMBERS.find(x=>x.id===id);
  const prayers = [`${m.name}同学加油！`,`工作顺利，前途光明！`,`学生会因你而精彩！`,`辛苦了，注意休息！`,`愿你学业事业双丰收！`,`继续发光发热！`];
  state.messages.unshift({id:Date.now(),author:'祈福人',target:id,text:prayers[Math.floor(Math.random()*prayers.length)],time:new Date().toLocaleString('zh-CN')});
  playPray();
  const stick = document.getElementById('stick-'+id);
  if (stick) { stick.style.height = Math.min(35,Math.max(4,state.tabletIncense[id]*35/30))+'px'; stick.style.display='block'; stick.className='incense-stick burning'; }
  const cnt = document.getElementById('inc-'+id); if(cnt) cnt.textContent = state.tabletIncense[id];
  renderMessages(); refreshMarquees(); updateStats(); saveState(); showFloat('🙏 祈福+2香');
}

// ========== MUYU ==========
const fishBtn = document.getElementById('woodenFish');
fishBtn.addEventListener('click', function(e) {
  const now = Date.now(); if (now - state.lastFishTime < 200) return; state.lastFishTime = now;
  state.totalMerit++; state.meritCombo++;
  clearTimeout(state.comboTimer); state.comboTimer = setTimeout(()=>{state.meritCombo=0;updateMeritDisplay();},2000);
  playMuyu(); muyuComboTotal++;
  if (muyuComboTotal >= 100 && !vipMode) {
    vipMode = true;
    showFloat('🎉 隐藏彩蛋！VIP已解锁！今日无限！', true);
    for(let i=0;i<10;i++) spawnParticles('🎉',5);
    ensureAudio(); [523,659,784,1047].forEach((f,i)=>{setTimeout(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.3);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.3);},i*200);});
  }
  updateMeritDisplay(); updateStats(); saveState();
  const rect = fishBtn.getBoundingClientRect();
  const f = document.createElement('div'); f.className='merit-float';
  f.textContent = `功德+1${state.meritCombo>2?` x${state.meritCombo}`:''}`;
  f.style.left=(rect.left+rect.width/2-30)+'px'; f.style.top=(rect.top-10)+'px';
  document.body.appendChild(f); setTimeout(()=>f.remove(),1000);
  spawnParticles('✨',2);
});

function updateMeritDisplay() {
  document.getElementById('meritDisplay').textContent = `功德: ${state.totalMerit} | 连击: ${state.meritCombo}${state.meritCombo>=10?' 🔥':state.meritCombo>=5?' ⚡':''}`;
}

// ========== MESSAGES ==========
function postMessage() {
  const name = document.getElementById('msgName').value.trim() || '匿名同学';
  const target = document.getElementById('msgTarget').value;
  const text = document.getElementById('msgText').value.trim();
  if (!text) { alert('留言不能为空！'); return; }
  state.messages.unshift({id:Date.now(),author:name,target,text,time:new Date().toLocaleString('zh-CN')});
  document.getElementById('msgText').value = '';
  renderMessages(); refreshMarquees(); updateStats(); saveState();
  state.totalMerit++; saveState(); updateMeritDisplay(); updateStats();
  showFloat('💬 留言成功');
}

function renderMessages() {
  const list = document.getElementById('msgList');
  list.innerHTML = state.messages.map(m => {
    const tn = m.target==='all'?'所有人':(ALL_MEMBERS.find(x=>x.id===m.target)?.name||m.target);
    return `<div class="msg-card"><div class="msg-head"><span class="msg-author">📝 ${esc(m.author)}</span><span class="msg-time">${m.time}</span></div><div class="msg-text">${esc(m.text)}</div><div class="msg-target">致：${tn}</div></div>`;
  }).join('') || '<div style="text-align:center;color:#555;font-size:9px;padding:15px;">还没有留言</div>';
}

function updateStats() {
  const ti = Object.values(state.tabletIncense).reduce((s,v)=>s+v,0);
  document.getElementById('totalIncense').textContent = ti;
  document.getElementById('totalMerit').textContent = state.totalMerit;
  document.getElementById('totalMsgs').textContent = state.messages.length;
  const u = getDailyUsage();
  const left = (DAILY_INCENSE_LIMIT-u.incense)+(DAILY_PRAY_LIMIT-u.pray);
  if (vipMode) { document.getElementById('dailyLeft').textContent='∞'; document.getElementById('dailyLeft').style.color='#FFD700'; }
  else { document.getElementById('dailyLeft').textContent=left; document.getElementById('dailyLeft').style.color=left<=0?'#CC3333':'#5B8C32'; }
}

function updateMsgTargetOptions() {
  const sel = document.getElementById('msgTarget');
  sel.innerHTML = '<option value="all">给所有人</option>' + ALL_MEMBERS.map(m=>`<option value="${m.id}">${m.name}（${m.role}）</option>`).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}

function showFloat(text, center) {
  const el = document.createElement('div'); el.className='merit-float'; el.textContent=text;
  if (center) { el.style.left='50%'; el.style.top='40%'; el.style.transform='translateX(-50%)'; el.style.fontSize='14px'; el.style.zIndex='99999'; }
  else { el.style.left=(30+Math.random()*40)+'vw'; el.style.top=(30+Math.random()*20)+'vh'; }
  document.body.appendChild(el); setTimeout(()=>el.remove(),1200);
}

function spawnParticles(emoji, count) {
  for(let i=0;i<count;i++) setTimeout(()=>{const p=document.createElement('div');p.className='particle';p.textContent=emoji;p.style.fontSize=(8+Math.random()*10)+'px';p.style.left=(30+Math.random()*40)+'vw';p.style.top=(30+Math.random()*20)+'vh';document.body.appendChild(p);setTimeout(()=>p.remove(),1500);},i*80);
}

function esc(str) { const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

// ========== INIT ==========
loadState(); renderDepts(); renderMessages(); refreshMarquees(); updateMeritDisplay();
setInterval(()=>{ loadState(); renderDepts(); refreshMarquees(); }, 5*60*1000);
</script>
</body>
</html>

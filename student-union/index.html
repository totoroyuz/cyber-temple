.tab-content { display: none; max-width: 900px; margin: 0 auto; padding: 0 10px; }

.tablets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 10px; }
.tablet { background: linear-gradient(180deg, #3a3a5c 0%, #2a2a4a 100%); border: 4px solid #555; padding: 0; position: relative; transition: all 0.3s; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s ease forwards; }

.tablet:nth-child(2) { animation-delay: 0.1s; }
.tablet:nth-child(3) { animation-delay: 0.15s; }
.tablet:nth-child(4) { animation-delay: 0.2s; }
.tablet:nth-child(5) { animation-delay: 0.25s; }
.tablet:nth-child(6) { animation-delay: 0.3s; }
.tablet:nth-child(7) { animation-delay: 0.35s; }
.tablet:nth-child(8) { animation-delay: 0.4s; }
.tablet:nth-child(9) { animation-delay: 0.45s; }
.tablet:nth-child(10) { animation-delay: 0.5s; }

.tablet-top::before { left: 15px; }
.tablet-top::after { right: 15px; }
.tablet-name { font-size: 20px; color: var(--gold); text-shadow: 1px 1px 0 #000; letter-spacing: 2px; }
.tablet-title { font-size: 13px; color: #ccc; margin-top: 3px; }
.tablet-body { padding: 12px; text-align: center; }
.tablet-avatar { width: 56px; height: 56px; margin: 0 auto 8px; background: #555; border: 3px solid #777; display: flex; align-items: center; justify-content: center; font-size: 42px; }
.tablet-desc { font-size: 14px; color: #bbb; line-height: 1.8; margin-bottom: 10px; min-height: 35px; }
.tablet-reputation { font-size: 13px; color: #aaa; background: rgba(0,0,0,0.2); padding: 6px 8px; margin-bottom: 10px; border-left: 3px solid var(--gold); text-align: left; line-height: 1.6; }

.tablet-actions { display: flex; gap: 4px; }
.tablet-actions button { flex: 1; font-family: 'Press Start 2P', monospace; font-size: 14px; padding: 7px 4px; background: #444; color: #ddd; border: 2px solid #666; cursor: pointer; transition: all 0.2s; }

.messages-area { max-width: 650px; margin: 0 auto; padding: 10px; }
.msg-form { background: rgba(0,0,0,0.3); border: 3px solid #555; padding: 12px; margin-bottom: 15px; }

.vote-btn:hover { background: var(--gold); color: #222; }

.incense-container { position: relative; height: 45px; margin: 8px 0 4px; overflow: hidden; }
.incense-stick { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; background: linear-gradient(to top, #8B4513, #D2691E); transition: height 0.5s ease; }
.incense-stick.burning .incense-tip { display: block; }
.incense-tip { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background: #FF6600; border-radius: 50%; box-shadow: 0 0 6px #FF6600, 0 0 12px #FF3300; animation: glow 1.5s infinite alternate; display: none; }

.merit-float { position: fixed; font-size: 20px; color: var(--gold); pointer-events: none; animation: floatUp 1s ease-out forwards; font-family: 'Press Start 2P', monospace; text-shadow: 1px 1px 0 #000; z-index: 9999; }

.footer { text-align: center; padding: 25px; font-size: 14px; color: #444; line-height: 2; }
.footer a { color: #666; text-decoration: none; }

@media (max-width: 600px) {

  .tabs { gap: 3px; }
  .tab-btn { font-size: 14px; padding: 8px 8px; }

// ========== AUDIO ENGINE ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playIncense() {
  ensureAudio();
  // 上香：音调上飘，像香烟袅袅上升
  [400, 600, 750, 950].forEach((freq, i) => {
    setTimeout(() => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(freq * 1.04, audioCtx.currentTime + 0.25);
      g.gain.setValueAtTime(0.15 - i * 0.02, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + 0.35);
    }, [0, 100, 200, 350][i]);
  });
}
function playMuyu() {
  ensureAudio();
  const t = audioCtx.currentTime;
  // 木鱼声：木槌短击 + 中低频空腔共鸣，避免纯电子高频尖响。
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0.0001, t);
  master.gain.exponentialRampToValueAtTime(0.75, t + 0.006);
  master.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
  master.connect(audioCtx.destination);

  const dur = 0.18;
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr * dur, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const x = i / sr;
    const attack = Math.exp(-x / 0.009);
    const hollow = Math.sin(2 * Math.PI * 620 * x) * Math.exp(-x / 0.075);
    const knock = Math.sin(2 * Math.PI * 930 * x) * Math.exp(-x / 0.038);
    const wood = Math.sin(2 * Math.PI * 310 * x) * Math.exp(-x / 0.12);
    const grain = (Math.random() * 2 - 1) * attack * 0.32;
    d[i] = grain + hollow * 0.46 + knock * 0.28 + wood * 0.2;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const tone = audioCtx.createBiquadFilter();
  tone.type = 'bandpass';
  tone.frequency.setValueAtTime(760, t);
  tone.Q.setValueAtTime(2.2, t);
  const soften = audioCtx.createBiquadFilter();
  soften.type = 'lowpass';
  soften.frequency.setValueAtTime(2600, t);
  soften.Q.setValueAtTime(0.8, t);
  src.connect(tone); tone.connect(soften); soften.connect(master);
  src.start(t);

  [
    { freq: 520, gain: 0.24, decay: 0.22 },
    { freq: 780, gain: 0.16, decay: 0.16 },
    { freq: 1040, gain: 0.08, decay: 0.1 }
  ].forEach(({ freq, gain, decay }) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(freq * (0.98 + Math.random() * 0.04), t);
    g.gain.setValueAtTime(gain, t + 0.004);
    g.gain.exponentialRampToValueAtTime(0.001, t + decay);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + decay + 0.03);
  });
}
function playPray() {
  ensureAudio();
  [400, 500, 600].forEach((freq, i) => {
    setTimeout(() => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.15, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + 0.2);
    }, i * 150);
  });
}


// ========== 每日限制 ==========
function getTodayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function getDailyUsage() {
  try {
    const d = JSON.parse(localStorage.getItem('daily_usage') || '{}');
    if (d.date !== getTodayKey()) {
      return { date: getTodayKey(), incense: 0, pray: 0, vip: false };
    }
    return {
      date: d.date,
      incense: Number(d.incense) || 0,
      pray: Number(d.pray) || 0,
      vip: !!d.vip
    };
  } catch(e) { return { date: getTodayKey(), incense: 0, pray: 0, vip: false }; }
}
function saveDailyUsage(u) {
  u.date = getTodayKey();
  localStorage.setItem('daily_usage', JSON.stringify(u));
}
const DAILY_INCENSE_LIMIT = 30;
const DAILY_PRAY_LIMIT = 20;

function getIncenseHeight(count) {
  if (!count) return 0;
  const minHeight = 5;
  const maxHeight = 40;
  const totalSegments = Math.ceil(50 / 4);
  const segment = Math.min(totalSegments, Math.ceil(count / 4));
  return Math.round(minHeight + (maxHeight - minHeight) * (segment - 1) / (totalSegments - 1));
}


// ========== API SYNC ==========
const API_BASE = 'https://textile-futures-salad-helpful.trycloudflare.com';
let apiConnected = false;

async function fetchApiData() {
  try {
    const r = await fetch(API_BASE + '/api/data');
    if (r.ok) {
      const data = await r.json();
      apiConnected = true;
      // Sync incense from server
      for (const [id, count] of Object.entries(data.incense || {})) {
        state.tabletIncense[id] = count;
      }
      // Merge messages (server + local)
      const apiMsgs = data.messages || [];
      const localMsgs = state.messages || [];
      const merged = [...apiMsgs];
      for (const lm of localMsgs) {
        if (!merged.find(m => m.id === lm.id)) merged.push(lm);
      }
      state.messages = merged.sort((a, b) => b.id - a.id).slice(0, 200);
      return true;
    }
  } catch (e) { console.log('API offline:', e.message); }
  apiConnected = false;
  return false;
}

async function apiBurnIncense(memberId, count) {
  try {
    const r = await fetch(API_BASE + '/api/incense', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ member_id: memberId, count: count || 1 })
    });
    return await r.json();
  } catch (e) { return null; }
}

      <button class="vote-btn ${hv ? 'voted' : ''}" onclick="vote(${v.id})">${hv ? '✅ 已投' : '⬆️ 投票'}</button>
    </div>`;
  }).join('') || '<div style="text-align:center;color:#555;font-size:8px;padding:15px;">还没有提名</div>';
}

function switchTab(name, evt) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  const btn = evt?.currentTarget || document.querySelector(`[onclick*="switchTab('${name}'"]`);
  if (btn) btn.classList.add('active');
}

function updateStats() {
  const u = getDailyUsage();
  const left = Math.max(0, DAILY_INCENSE_LIMIT - u.incense) + Math.max(0, DAILY_PRAY_LIMIT - u.pray);
  if (vipMode) {
    document.getElementById('dailyLeft').textContent = '∞';
    document.getElementById('dailyLeft').style.color = '#FFD700';
  } else {
    document.getElementById('dailyLeft').textContent = left;
    document.getElementById('dailyLeft').style.color = left <= 0 ? '#CC3333' : '#5B8C32';
  }
  const ti = Object.values(state.tabletIncense).reduce((s, v) => s + v, 0);
  document.getElementById('totalIncense').textContent = ti;
  document.getElementById('totalMerit').textContent = state.totalMerit;
  document.getElementById('totalMsgs').textContent = state.messages.length;
}
function updateMsgTargetOptions() {
  const sel = document.getElementById('msgTarget');
  sel.innerHTML = '<option value="all">给所有站长</option>' +
    TABLETS.map(t => `<option value="${t.id}">给 ${t.name}</option>`).join('');
}
function showFloat(text, center) {
  const el = document.createElement('div'); el.className = 'merit-float';
  el.textContent = text;
  if (center) {
    el.style.left = '50%'; el.style.top = '40%';
    el.style.transform = 'translateX(-50%)';
    el.style.fontSize = '14px'; el.style.color = '#FFD700';
    el.style.maxWidth = '82vw'; el.style.textAlign = 'center';
    el.style.lineHeight = '1.6'; el.style.whiteSpace = 'normal';
    el.style.zIndex = '99999';
  } else {
    el.style.left = (30 + Math.random() * 40) + 'vw';
    el.style.top = (30 + Math.random() * 20) + 'vh';
  }
  document.body.appendChild(el); setTimeout(() => el.remove(), 1000);
}
function spawnParticles(emoji, count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div'); p.className = 'particle';
      p.textContent = emoji; p.style.fontSize = (8 + Math.random() * 10) + 'px';
      p.style.left = (30 + Math.random() * 40) + 'vw';
      p.style.top = (30 + Math.random() * 20) + 'vh';
      document.body.appendChild(p); setTimeout(() => p.remove(), 1500);
    }, i * 80);
  }
}
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

loadState(); vipMode = !!getDailyUsage().vip; renderTablets(); renderMessages(); refreshMarquees();

// 每5分钟自动刷新排序+留言滚动
setInterval(async () => {
  await fetchApiData();
  renderTablets();
  refreshMarquees();
}, 30 * 1000); renderVotes(); updateMeritDisplay();
</script>
</body>
